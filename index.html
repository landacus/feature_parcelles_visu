<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Importation de bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaParcelle</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Modal -->
    <div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
        <div class="modal-header">
            <h1 class="modal-title fs-5" id="infoModalLabel">Informations concernant la visualisation des parcelles </h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            ...
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
        </div>
        </div>
    </div>
    </div>


    <div id="app-container">
        <header id="filters-panel">
            <!-- lien pour ouvrir le modal -->
            <h1 data-bs-toggle="modal" data-bs-target="#infoModal" style="cursor: pointer;">MaParcelle</h1>
            
            <label for="indicator-select">Caractéristique :</label>
            <select id="indicator-select" class="filter-mockup">
                <option value="altitude">Altitude moyenne (m)</option>
                <option value="pente">Pente moyenne (°)</option>
            </select>

            <label style="margin-left: 20px;">Type de parcelle :</label>
            <div class="dropdown" id="prairie-dropdown">
                <button class="filter-mockup" id="dropdown-btn">Tous les types <span style='font-size:10px'>▼</span></button>
                <div class="dropdown-content" id="prairie-checkboxes">
                    </div>
            </div>
            
            <button class="filter-mockup" id="btn-scatter">
              Scatter plot
            </button>
            <button class="filter-mockup" id="btn-scatter-all">Scatter plot parcelles</button>

            <div id="search-container" style="margin-left: auto;">
                <input type="text" id="search-bar" placeholder="Rechercher un lieu...">
                <div id="search-results"></div>
            </div>
        </header>

        <main id="main-content">
            <div id="map-container">
                <div id="nav-controls">
                    <button id="btn-back">⬅ Remonter</button>
                </div>
                <div id="legend"></div>
                <div id="tooltip"></div> 
                <svg id="map"></svg>
            </div>
            
            <div id="scatter-container" style="flex:1; display:none; background:white; position:relative;">
                <svg id="scatter-svg" width="100%" height="100%"></svg>
                <button id="scatter-back-btn" style="
                    position:absolute;
                    top:10px;
                    right:10px;
                    z-index:10;
                    display:none;
                ">
                ← Back
                </button>
            </div>

            <aside id="info-panel">
                <h2 id="info-title">Sélectionnez une zone</h2>
                <div id="info-content">
                    <p>Niveau : <span id="panel-level">-</span></p>
                    <hr>
                    <p>Nombre de parcelles : <b id="nb-parcelles">-</b></p>
                    <p>Altitude moyenne : <b id="alt-val">-</b></p>
                    <p>Pente moyenne : <b id="pente-val">-</b></p>
                    <hr>
                    <h3>Top 5 des cultures (Surface)</h3>
                    <div id="top-prairies-chart" class="modern-chart-container"></div>
                </div>
            </aside>
        </main>
    </div>

    <div id="scatter-tooltip" 
         style="
            position:absolute;
            background:rgba(0,0,0,0.8);
            color:white;
            padding:8px 12px;
            border-radius:6px;
            font-size:13px;
            pointer-events:none;
            opacity:0;
            transition:opacity 0.2s;
            z-index: 10000;
         ">
    </div>
    <script type="module" src="app.js"></script>
    <!-- Importation de bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script>
        // Ouvrir le modal automatiquement au chargement de la page
        window.addEventListener('DOMContentLoaded', () => {
            const infoModal = new bootstrap.Modal(document.getElementById('infoModal'));
            infoModal.show();
        });
    </script>
</body>
</html>
